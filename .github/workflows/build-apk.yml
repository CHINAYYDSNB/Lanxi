name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - name: Restore keystore
        continue-on-error: true
        run: |
          if [ -n "$KS" ]; then
            echo "$KS" | base64 -d > android/app/lanxi-keystore.jks
            echo "storeFile=lanxi-keystore.jks" > android/app/key.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/app/key.properties
            echo "keyAlias=lanxi" >> android/app/key.properties
            echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/app/key.properties
          fi
        env:
          KS: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lanxi-release
          path: build/app/outputs/flutter-apk/app-release.apk
